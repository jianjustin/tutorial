apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-micro-service-account
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: go-micro-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: go-micro-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: go-micro-service-account
  namespace: default
roleRef:
  kind: Role
  name: go-micro-role
  apiGroup: rbac.authorization.k8s.io
