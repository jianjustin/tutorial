apiVersion: apps/v1
kind: Deployment
metadata:
  name: mul-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mul
  template:
    metadata:
      labels:
        app: mul
    spec:
      containers:
        - name: mul
          image: mul:latest
          ports:
            - containerPort: 60001
---
apiVersion: v1
kind: Service
metadata:
  name: mul-service
spec:
  selector:
    app: mul
  ports:
    - protocol: TCP
      port: 80
      targetPort: 60001