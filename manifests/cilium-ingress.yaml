apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    ingress.cilium.io/protocol: http
    ingress.cilium.io/health-check-port: "80"
    cilium.io/strip-prefix: "/api"
spec:
  ingressClassName: cilium
  rules:
    - http:
        paths:
          - path: /api/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80